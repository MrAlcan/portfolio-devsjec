server {
    listen 80;
    server_name _;

    # Ocultar versión de nginx en headers
    server_tokens off;

    # ----- Compresión -----
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/wasm
        image/svg+xml
        font/woff2;

    # Brotli (descomentar si la imagen de nginx incluye ngx_brotli)
    # brotli on;
    # brotli_comp_level 5;
    # brotli_min_length 256;
    # brotli_types
    #     text/plain text/css text/xml text/javascript
    #     application/json application/javascript application/xml application/xml+rss
    #     application/wasm image/svg+xml font/woff2;

    # ----- Security headers (always = aplica también a 4xx/5xx) -----
    # HSTS — empezar conservador (5 min). Subir a 31536000+preload tras 2 semanas estables sobre HTTPS.
    add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    # CSP en Report-Only por 1-2 semanas; al confirmar que no rompe nada, cambiar a Content-Security-Policy
    add_header Content-Security-Policy-Report-Only "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; script-src 'self' 'unsafe-inline'; connect-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;

    # ----- Assets de Astro (hash inmutable) -----
    location /_astro/ {
        proxy_pass http://app:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        add_header Vary "Accept-Encoding" always;
    }

    # ----- Sitemap, robots, manifest, security.txt -----
    location ~* ^/(sitemap.*\.xml|robots\.txt|manifest\.webmanifest|\.well-known/security\.txt|rss\.xml)$ {
        proxy_pass http://app:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
    }

    # ----- Imágenes y fuentes -----
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|avif|woff|woff2|ttf|otf|pdf)$ {
        proxy_pass http://app:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        add_header Vary "Accept-Encoding" always;
    }

    # ----- HTML pages: cache muy corto en edge para soportar updates de contenido rápido -----
    location / {
        proxy_pass http://app:4321;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # HTML — corto cache compartido (CDN puede revalidar rápido)
        add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate" always;
    }
}
