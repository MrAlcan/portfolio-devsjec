services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_API_URL: ${PUBLIC_API_URL}
    container_name: portafolio-devsjec-app
    restart: unless-stopped
    env_file: .env
    expose:
      - "4321"
    networks:
      - portafolio-devsjec-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4321"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: portafolio-devsjec-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8081:80"           # puerto del HOST que verá el Nginx del servidor
    depends_on:
      app:
        condition: service_healthy
    networks:
      - portafolio-devsjec-net

networks:
  portafolio-devsjec-net:
    driver: bridge